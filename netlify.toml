[build]
  command = "dotnet publish -c Release -o ./publish"
  publish = "publish/wwwroot"

[build.environment]
  DOTNET_VERSION = "8.0"
  DOTNET_NOLOGO = "true"
  DOTNET_CLI_TELEMETRY_OPTOUT = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ----------------------------------------------------------------------------
# Cache strategy:
# - _framework/* : content-addressed filenames (build embeds hashes), so
#   cache them forever. The browser only re-downloads after a new deploy
#   that changes the filename.
# - Everything else: must revalidate every visit so deploys go live.
# ----------------------------------------------------------------------------

[[headers]]
  for = "/_framework/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
